name: 🤖 Pi Oracle

on:
  workflow_call:
    secrets:
      PI_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pi Coding Agent
        uses: badlogicgames/pi-codingagent@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PI_API_KEY: ${{ secrets.PI_API_KEY }}
