name: 🐾 Clawdbot Oracle

on:
  workflow_call:
    secrets:
      CLAWDBOT_API_KEY:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clawdbot Analysis
        uses: clawdbot/review-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAWDBOT_API_KEY: ${{ secrets.CLAWDBOT_API_KEY }}
